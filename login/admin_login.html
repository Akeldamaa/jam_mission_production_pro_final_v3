<head>

  <meta charset="UTF-8" />

  <title>Admin Login – JAM Mission</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    .login-wrapper {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, var(--navy) 0%, #0d1f33 100%);
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h2 {
      color: var(--navy);
      text-align: center;
      margin-bottom: 8px;
    }
    .login-card .subtitle {
      text-align: center;
      color: var(--text-light);
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .login-card label {
      display: block;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }
    .login-card input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .login-card input:focus {
      border-color: var(--gold);
      outline: none;
    }
    .login-card button {
      width: 100%;
      padding: 14px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .login-card button:hover {
      background: var(--gold);
      color: var(--navy);
    }
    .login-msg {
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 0.9rem;
      display: none;
    }
    .login-msg.error {
      display: block;
      background: #fee;
      color: #c00;
      border: 1px solid #fcc;
    }
    .login-msg.success {
      display: block;
      background: #efe;
      color: #060;
      border: 1px solid #cfc;
    }
    .login-icon {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    Call us: <a href="tel:8555266376">(855) 526-6376</a> &nbsp;|&nbsp; 16 Acres in Tuskegee, Alabama
  </div>
  <nav>
    <span class="nav-logo">JAM MISSION</span>
    <a href="../index.html">Home</a>
    <a href="../about.html">About Us</a>
    <a href="../mission.html">Our Mission</a>
    <a href="../booking/booking.html">Book Now</a>
    <a href="../blog/index.html">Blog</a>
    <a href="../contact/contact.html">Contact</a>
  </nav>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-icon">&#x1f512;</div>
      <h2>Admin Login</h2>
      <p class="subtitle">JAM Mission Administrator Portal</p>

      <form id="adminForm">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />

        <button type="submit">Sign In</button>

        <div id="loginMsg" class="login-msg"></div>
      </form>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('jam_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('adminForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var msg = document.getElementById('loginMsg');
      var user = document.getElementById('username').value.trim();
      var pass = document.getElementById('password').value;

      // Simple hash check (not for production - use a real backend for security)
      var validUser = 'jammission';
      var validHash = hashCode('WalkNarrow!');

      if (user === validUser && hashCode(pass) === validHash) {
        msg.className = 'login-msg success';
        msg.textContent = 'Login successful! Redirecting...';
        sessionStorage.setItem('jam_admin_auth', 'true');
        sessionStorage.setItem('jam_admin_user', user);
        setTimeout(function() {
          window.location.href = 'dashboard.html';
        }, 800);
      } else {
        msg.className = 'login-msg error';
        msg.textContent = 'Invalid username or password. Please try again.';
        document.getElementById('password').value = '';
      }
    });

    // Simple string hash function
    function hashCode(str) {
      var hash = 0;
      for (var i = 0; i < str.length; i++) {
        var char = str.charCodeAt(i);
        hash = ((hash << 5) - hash) + char;
        hash = hash & hash; // Convert to 32bit integer
      }
      return hash;
    }
  </script>
</body>
</html>
